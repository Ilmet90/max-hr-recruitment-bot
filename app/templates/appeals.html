{% extends "base.html" %}
{% block content %}
<h1>Сообщения</h1>
<table>
  <thead><tr><th>ID</th><th>Дата</th><th>ФИО</th><th>Телефон</th><th>Текст</th><th>Статус</th></tr></thead>
  <tbody>
  {% for item in items %}
    <tr>
      <td>{{ item.id }}</td>
      <td>{{ item.created_at }}</td>
      <td>{{ item.full_name }}</td>
      <td>{{ item.phone }}</td>
      <td>{{ item.appeal_text }}</td>
      <td>{% include "status_form.html" %}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
