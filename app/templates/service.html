{% extends "base.html" %}
{% block content %}
<h1>{{ t("service.title", "Условия службы") }}</h1>
<form class="form" method="post" action="/admin/service">
  {% for item in items %}
    <section class="panel">
      <h2>{{ service_info_label(item.key) }}</h2>
      <p class="small">{{ t("service.technical_key", "Технический ключ") }}: {{ item.key }}</p>
      <p>{{ service_info_help(item.key) }}</p>
      <label>{{ t("service.heading", "Заголовок") }}<input name="title_{{ item.key }}" value="{{ item.title }}" required></label>
      <label>{{ t("service.text", "Текст") }}<textarea name="text_{{ item.key }}" required>{{ item.text }}</textarea></label>
    </section>
  {% endfor %}
  <button type="submit">{{ t("common.save", "Сохранить") }}</button>
</form>
{% endblock %}
