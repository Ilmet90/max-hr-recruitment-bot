{% extends "base.html" %}
{% block content %}
<h1>{{ t("contacts.edit", "Редактировать контакт") if item.id else t("contacts.new_full", "Добавить контакт") }}</h1>
<form class="form" method="post" action="{{ action }}">
  <label>{{ t("contacts.title_field", "Название") }}<input name="title" value="{{ item.title or '' }}" required></label>
  <label>{{ t("contacts.value", "Значение") }}<input name="value" value="{{ item.value or '' }}" required></label>
  <label>{{ t("contacts.note", "Примечание") }}<textarea name="note">{{ item.note or '' }}</textarea></label>
  <label>{{ t("contacts.sort_order_full", "Порядок сортировки") }}<input name="sort_order" type="number" value="{{ item.sort_order or 100 }}"></label>
  <label class="check"><input name="is_active" type="checkbox" value="1" {% if item.is_active is not defined or item.is_active %}checked{% endif %}> {{ t("statuses.active", "Активен") }}</label>
  <button type="submit">{{ t("common.save", "Сохранить") }}</button>
</form>
{% endblock %}
