{% extends "base.html" %}
{% block content %}
<h1>{{ t("vacancies.edit", "Редактировать вакансию") if item.id else t("vacancies.new", "Добавить вакансию") }}</h1>
<form class="form" method="post" action="{{ action }}">
  <label>{{ t("vacancies.position", "Название") }}<input name="title" value="{{ item.title or '' }}" required></label>
  <label>{{ t("vacancies.salary", "Зарплата") }}<input name="salary" value="{{ item.salary or '' }}"></label>
  <label>{{ t("vacancies.duties", "Обязанности") }}<textarea name="duties">{{ item.duties or '' }}</textarea></label>
  <label>{{ t("vacancies.requirements", "Требования") }}<textarea name="requirements">{{ item.requirements or '' }}</textarea></label>
  <label>{{ t("vacancies.conditions", "Условия") }}<textarea name="conditions">{{ item.conditions or '' }}</textarea></label>
  <label>{{ t("vacancies.note", "Примечание") }}<textarea name="note">{{ item.note or '' }}</textarea></label>
  <label>{{ t("vacancies.sort_order", "Порядок сортировки") }}<input name="sort_order" type="number" value="{{ item.sort_order or 100 }}"></label>
  <label class="check"><input name="is_active" type="checkbox" value="1" {% if item.is_active is not defined or item.is_active %}checked{% endif %}> {{ t("vacancies.active", "Активна") }}</label>
  <button type="submit">{{ t("actions.save", "Сохранить") }}</button>
</form>
{% endblock %}
