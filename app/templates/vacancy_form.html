{% extends "base.html" %}
{% block content %}
<h1>{{ "Редактировать вакансию" if item.id else "Добавить вакансию" }}</h1>
<form class="form" method="post" action="{{ action }}">
  <label>Название<input name="title" value="{{ item.title or '' }}" required></label>
  <label>Зарплата<input name="salary" value="{{ item.salary or '' }}"></label>
  <label>Обязанности<textarea name="duties">{{ item.duties or '' }}</textarea></label>
  <label>Требования<textarea name="requirements">{{ item.requirements or '' }}</textarea></label>
  <label>Условия<textarea name="conditions">{{ item.conditions or '' }}</textarea></label>
  <label>Примечание<textarea name="note">{{ item.note or '' }}</textarea></label>
  <label>Порядок сортировки<input name="sort_order" type="number" value="{{ item.sort_order or 100 }}"></label>
  <label class="check"><input name="is_active" type="checkbox" value="1" {% if item.is_active is not defined or item.is_active %}checked{% endif %}> Активна</label>
  <button type="submit">Сохранить</button>
</form>
{% endblock %}
