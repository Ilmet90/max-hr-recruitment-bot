<!doctype html>
<html lang="{{ ui_lang or 'ru' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ web_admin_title }}</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    :root {
      --theme-primary: {{ org_settings.theme_primary_color }};
      --theme-secondary: {{ org_settings.theme_secondary_color }};
      --theme-accent: {{ org_settings.theme_accent_color }};
    }
  </style>
</head>
<body class="login-page">
  <main class="login-box">
    <h1>{{ web_admin_title }}</h1>
    {% if request.query_params.get("error") %}
      <p class="alert">{{ t("login.invalid_credentials", "Неверный логин или пароль.") }}</p>
    {% endif %}
    <form class="language-select-form login-language-switcher" method="get" action="/admin/login">
      <label for="login-language">{{ t("language.select_label", "Язык / Language") }}</label>
      <select id="login-language" class="language-select" name="lang" onchange="this.form.submit()">
        {% for locale in supported_locales %}
          <option value="{{ locale }}" {% if locale == ui_lang %}selected{% endif %}>{{ locale_label(locale) }}</option>
        {% endfor %}
      </select>
      <noscript><button type="submit">{{ t("common.save", "Сохранить") }}</button></noscript>
    </form>
    <form method="post" action="/admin/login">
      <label>{{ t("login.login", "Логин") }}<input name="username" autocomplete="username" required></label>
      <label>{{ t("login.password", "Пароль") }}<input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">{{ t("login.sign_in", "Войти") }}</button>
    </form>
  </main>
</body>
</html>
