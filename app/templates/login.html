<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ org_settings.web_admin_title }}</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    :root {
      --theme-primary: {{ org_settings.theme_primary_color }};
      --theme-secondary: {{ org_settings.theme_secondary_color }};
      --theme-accent: {{ org_settings.theme_accent_color }};
    }
  </style>
</head>
<body class="login-page">
  <main class="login-box">
    <h1>{{ org_settings.web_admin_title }}</h1>
    {% if request.query_params.get("error") %}
      <p class="alert">Неверный логин или пароль.</p>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>Логин<input name="username" autocomplete="username" required></label>
      <label>Пароль<input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">Войти</button>
    </form>
  </main>
</body>
</html>
